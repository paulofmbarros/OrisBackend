name: AI Agent - Plan Phase

on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: 'Jira ticket key (e.g., OR-25)'
        required: true
        type: string
      role:
        description: 'Agent role'
        required: false
        default: 'backend'
        type: choice
        options:
          - backend
      runtime:
        description: 'AI Runtime'
        required: false
        default: 'gemini'
        type: choice
        options:
          - gemini
  issue_comment:
    types: [created]

jobs:
  plan:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.comment.body, '/agent ')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract trigger context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_JIRA_TICKET: ${{ github.event.inputs.jira_ticket }}
          INPUT_ROLE: ${{ github.event.inputs.role }}
          INPUT_RUNTIME: ${{ github.event.inputs.runtime }}
          COMMENT_BODY_VAL: ${{ github.event.comment.body }}
          ISSUE_NUMBER_VAL: ${{ github.event.issue.number }}
        run: |
          JIRA_KEY=""
          ROLE="backend"
          RUNTIME="gemini"
          ISSUE_NUMBER=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            JIRA_KEY="$INPUT_JIRA_TICKET"
            ROLE="$INPUT_ROLE"
            RUNTIME="$INPUT_RUNTIME"
            PROMPT="Work on Jira ticket $JIRA_KEY"
          else
            COMMENT_BODY="$COMMENT_BODY_VAL"
            PROMPT="$(printf '%s\n' "$COMMENT_BODY" | sed -E 's|^\s*/agent\s+||')"
            JIRA_KEY="$(printf '%s\n' "$PROMPT" | grep -oE '[A-Z]+-[0-9]+' | head -1 || true)"
            ISSUE_NUMBER="$ISSUE_NUMBER_VAL"
          fi

          if [ -z "$PROMPT" ]; then
            echo "Prompt cannot be empty." >&2
            exit 1
          fi

          {
            echo "PROMPT<<EOF"
            echo "$PROMPT"
            echo "EOF"
            echo "ROLE=$ROLE"
            echo "RUNTIME=$RUNTIME"
            echo "JIRA_KEY=$JIRA_KEY"
            echo "ISSUE_NUMBER=$ISSUE_NUMBER"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Configure MCP Servers
        run: |
          mkdir -p ~/.gemini

          node <<'EOF'
          const fs = require('fs');
          const mcpServers = {};

          if (process.env.NOTION_API_KEY) {
            mcpServers.notion = {
              command: 'npx',
              args: ['-y', '@modelcontextprotocol/server-notion'],
              env: {
                NOTION_API_KEY: process.env.NOTION_API_KEY,
              },
            };
          }

          if (
            process.env.ATLASSIAN_MCP_URL &&
            process.env.ATLASSIAN_MCP_CLIENT_ID &&
            process.env.ATLASSIAN_MCP_CLIENT_SECRET
          ) {
            mcpServers['atlassian-rovo-mcp-server'] = {
              url: process.env.ATLASSIAN_MCP_URL,
              auth: {
                type: 'oauth2',
                clientId: process.env.ATLASSIAN_MCP_CLIENT_ID,
                clientSecret: process.env.ATLASSIAN_MCP_CLIENT_SECRET,
              },
            };
          }

          fs.writeFileSync(
            process.env.HOME + '/.gemini/settings.json',
            JSON.stringify({ mcpServers }, null, 2)
          );
          EOF
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ATLASSIAN_MCP_URL: ${{ secrets.ATLASSIAN_MCP_URL }}
          ATLASSIAN_MCP_CLIENT_ID: ${{ secrets.ATLASSIAN_MCP_CLIENT_ID }}
          ATLASSIAN_MCP_CLIENT_SECRET: ${{ secrets.ATLASSIAN_MCP_CLIENT_SECRET }}

      - name: Setup environment
        run: |
          chmod +x scripts/agent.sh
          chmod +x scripts/run-phase.sh
          chmod +x scripts/runtimes/*.sh
          chmod +x scripts/lib/*.sh

      - name: Prepare agent prompt
        id: prep_agent
        env:
          PROMPT: ${{ steps.context.outputs.PROMPT }}
          ROLE: ${{ steps.context.outputs.ROLE }}
        run: |
          CONTRACT_FILE="agent-contracts/${ROLE}.md"

          FULL_PROMPT="You are the Oris Backend Engineer AI.

          ### CRITICAL RESOURCES:
          Your mandatory behavior contract and architecture rules are located in: '${CONTRACT_FILE}'.

          ### RULES:
          1. **READ THE CONTRACT**: Use your file system tools to read '${CONTRACT_FILE}' immediately.
          2. **MCP TOOLS**:
             - Use Notion MCP to search for 'Domain Definition' and the Jira ticket key.
             - Summarize findings in 'Notion References'.

          ### TASK:
          ${PROMPT}

          IMPORTANT: Stop after 'Proposed Plan'. Do not implement yet."

          {
            echo "ENHANCED_PROMPT<<EOF"
            echo "$FULL_PROMPT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run AI agent
        id: agent_plan_run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUNTIME: ${{ steps.context.outputs.RUNTIME }}
          ROLE: ${{ steps.context.outputs.ROLE }}
          ENHANCED_PROMPT: ${{ steps.prep_agent.outputs.ENHANCED_PROMPT }}
        run: |
          set +e
          OUTPUT_FILE="$(mktemp)"
          ERROR_FILE="$(mktemp)"

          HEADLESS=true ./scripts/run-phase.sh \
            --runtime "$RUNTIME" \
            --role "$ROLE" \
            --phase plan \
            "$ENHANCED_PROMPT" \
            > "$OUTPUT_FILE" 2> "$ERROR_FILE"

          EXIT_CODE=$?

          {
            echo "PLAN_OUTPUT<<EOF"
            cat "$OUTPUT_FILE"
            echo "EOF"
            echo "PLAN_ERROR<<EOF"
            cat "$ERROR_FILE"
            echo "EOF"
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

          mkdir -p plan-output-temp
          cp "$OUTPUT_FILE" plan-output-temp/output.txt
          cp "$ERROR_FILE" plan-output-temp/error.txt
          echo "$EXIT_CODE" > plan-output-temp/exit_code.txt

          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

      - name: Display plan output
        if: steps.agent_plan_run.outputs.PLAN_OUTPUT != ''
        run: |
          echo "## AI Agent Plan Output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat plan-output-temp/output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Save context artifacts
        env:
          PROMPT: ${{ steps.context.outputs.PROMPT }}
          ROLE: ${{ steps.context.outputs.ROLE }}
          RUNTIME: ${{ steps.context.outputs.RUNTIME }}
          JIRA_KEY: ${{ steps.context.outputs.JIRA_KEY }}
        run: |
          mkdir -p plan-context
          printf '%s\n' "$PROMPT" > plan-context/prompt.txt
          printf '%s\n' "$ROLE" > plan-context/role.txt
          printf '%s\n' "$RUNTIME" > plan-context/runtime.txt
          printf '%s\n' "$JIRA_KEY" > plan-context/jira_ticket.txt

      - name: Save plan state
        run: |
          mkdir -p plan-state

          if [ -f tmp/state/active_plan.md ]; then
            cp tmp/state/active_plan.md plan-state/active_plan.md
          fi

          if [ -f tmp/state/active_ticket.txt ]; then
            cp tmp/state/active_ticket.txt plan-state/active_ticket.txt
          fi

          if [ ! -f plan-state/active_plan.md ]; then
            echo "Missing tmp/state/active_plan.md after planning run." >&2
            exit 1
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-plan
          path: plan-output-temp/
          retention-days: 7

      - name: Upload context artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-context
          path: plan-context/
          retention-days: 7

      - name: Upload state artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-state
          path: plan-state/
          retention-days: 7

      - name: Post plan comment
        if: steps.context.outputs.ISSUE_NUMBER != ''
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.context.outputs.ISSUE_NUMBER }}
          PLAN_OUTPUT: ${{ steps.agent_plan_run.outputs.PLAN_OUTPUT }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const planOutput = process.env.PLAN_OUTPUT || '';

            const body = `## AI Agent Plan

            ${planOutput}

            ---
            **Run ID:** ${process.env.GITHUB_RUN_ID}

            Next:
            - Comment \`/proceed\` to implement the approved plan
            - Comment \`/revise <feedback>\` to request plan changes

            <!-- Agent Plan Run ID: ${process.env.GITHUB_RUN_ID} -->`;

            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
