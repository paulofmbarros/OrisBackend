name: AI Agent - Review Phase

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Find latest plan run
        id: find_plan
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });

            let planRunId = null;
            for (const comment of comments.data.slice().reverse()) {
              const match =
                comment.body.match(/Agent Plan Run ID:\s*(\d+)/) ||
                comment.body.match(/\*\*Run ID:\*\*\s*(\d+)/) ||
                comment.body.match(/Run ID:\s*(\d+)/);

              if (match && /AI Agent Plan/.test(comment.body)) {
                planRunId = match[1];
                break;
              }
            }

            if (!planRunId) {
              core.setFailed('Could not find the latest plan run. Generate or revise a plan before review.');
              return;
            }

            core.setOutput('run_id', planRunId);

      - name: Download plan context
        uses: dawidd6/action-download-artifact@v3
        with:
          name: agent-context
          path: plan-context/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.find_plan.outputs.run_id }}
          if_no_artifact_found: fail

      - name: Download plan state
        uses: dawidd6/action-download-artifact@v3
        with:
          name: agent-state
          path: plan-state/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.find_plan.outputs.run_id }}
          if_no_artifact_found: fail

      - name: Read plan context
        id: plan_context
        run: |
          if [ ! -f plan-context/prompt.txt ]; then
            echo "Missing plan prompt artifact." >&2
            exit 1
          fi

          {
            echo "PROMPT<<EOF"
            cat plan-context/prompt.txt
            echo "EOF"
            echo "ROLE=$(cat plan-context/role.txt)"
            echo "RUNTIME=$(cat plan-context/runtime.txt)"
            echo "JIRA_KEY=$(cat plan-context/jira_ticket.txt)"
          } >> "$GITHUB_OUTPUT"

      - name: Restore plan state
        run: |
          mkdir -p tmp/state

          if [ -f plan-state/active_plan.md ]; then
            cp plan-state/active_plan.md tmp/state/active_plan.md
          fi

          if [ -f plan-state/active_ticket.txt ]; then
            cp plan-state/active_ticket.txt tmp/state/active_ticket.txt
          fi

      - name: Setup branch
        id: setup_branch
        run: |
          JIRA_KEY="${{ steps.plan_context.outputs.JIRA_KEY }}"
          if [ -z "$JIRA_KEY" ]; then
            echo "No Jira ticket found in plan context." >&2
            exit 1
          fi

          KEY_LOWER="$(printf '%s\n' "$JIRA_KEY" | tr '[:upper:]' '[:lower:]')"
          BRANCH_NAME="feature/$KEY_LOWER"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin
          if git rev-parse --verify "origin/$BRANCH_NAME" >/dev/null 2>&1; then
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            echo "Remote branch origin/$BRANCH_NAME was not found." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Configure MCP servers
        run: |
          mkdir -p ~/.gemini

          node <<'EOF'
          const fs = require('fs');
          const mcpServers = {};

          if (process.env.NOTION_API_KEY) {
            mcpServers.notion = {
              command: 'npx',
              args: ['-y', '@modelcontextprotocol/server-notion'],
              env: {
                NOTION_API_KEY: process.env.NOTION_API_KEY,
              },
            };
          }

          if (
            process.env.ATLASSIAN_MCP_URL &&
            process.env.ATLASSIAN_MCP_CLIENT_ID &&
            process.env.ATLASSIAN_MCP_CLIENT_SECRET
          ) {
            mcpServers['atlassian-rovo-mcp-server'] = {
              url: process.env.ATLASSIAN_MCP_URL,
              auth: {
                type: 'oauth2',
                clientId: process.env.ATLASSIAN_MCP_CLIENT_ID,
                clientSecret: process.env.ATLASSIAN_MCP_CLIENT_SECRET,
              },
            };
          }

          fs.writeFileSync(
            process.env.HOME + '/.gemini/settings.json',
            JSON.stringify({ mcpServers }, null, 2)
          );
          EOF
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ATLASSIAN_MCP_URL: ${{ secrets.ATLASSIAN_MCP_URL }}
          ATLASSIAN_MCP_CLIENT_ID: ${{ secrets.ATLASSIAN_MCP_CLIENT_ID }}
          ATLASSIAN_MCP_CLIENT_SECRET: ${{ secrets.ATLASSIAN_MCP_CLIENT_SECRET }}

      - name: Configure review environment
        env:
          ATLASSIAN_MCP_URL: ${{ secrets.ATLASSIAN_MCP_URL }}
          ATLASSIAN_MCP_CLIENT_ID: ${{ secrets.ATLASSIAN_MCP_CLIENT_ID }}
          ATLASSIAN_MCP_CLIENT_SECRET: ${{ secrets.ATLASSIAN_MCP_CLIENT_SECRET }}
        run: |
          if [ -n "$ATLASSIAN_MCP_URL" ] && [ -n "$ATLASSIAN_MCP_CLIENT_ID" ] && [ -n "$ATLASSIAN_MCP_CLIENT_SECRET" ]; then
            echo "AGENT_GEMINI_POST_REVIEW_JIRA_COMMENT=true" >> "$GITHUB_ENV"
          else
            echo "AGENT_GEMINI_POST_REVIEW_JIRA_COMMENT=false" >> "$GITHUB_ENV"
          fi

          echo "AGENT_GEMINI_REQUIRE_REVIEW_JIRA_COMMENT=false" >> "$GITHUB_ENV"

      - name: Setup environment
        run: |
          chmod +x scripts/agent.sh
          chmod +x scripts/run-phase.sh
          chmod +x scripts/runtimes/*.sh
          chmod +x scripts/lib/*.sh

      - name: Run review phase
        id: agent_review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT: ${{ steps.plan_context.outputs.PROMPT }}
          ROLE: ${{ steps.plan_context.outputs.ROLE }}
          RUNTIME: ${{ steps.plan_context.outputs.RUNTIME }}
          JIRA_KEY: ${{ steps.plan_context.outputs.JIRA_KEY }}
        run: |
          set +e
          OUTPUT_FILE="$(mktemp)"
          ERROR_FILE="$(mktemp)"

          REVIEW_PROMPT="${PROMPT}"$'\n\n'"Review the implemented code for ${JIRA_KEY}. Approved. Apply the proposed review changes."

          HEADLESS=true ./scripts/run-phase.sh \
            --runtime "$RUNTIME" \
            --role "$ROLE" \
            --phase review \
            "$REVIEW_PROMPT" \
            > "$OUTPUT_FILE" 2> "$ERROR_FILE"

          EXIT_CODE=$?

          {
            echo "REVIEW_OUTPUT<<EOF"
            cat "$OUTPUT_FILE"
            echo "EOF"
            echo "REVIEW_ERROR<<EOF"
            cat "$ERROR_FILE"
            echo "EOF"
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

          mkdir -p review-artifact
          cp "$OUTPUT_FILE" review-artifact/output.txt
          cp "$ERROR_FILE" review-artifact/error.txt
          echo "$EXIT_CODE" > review-artifact/exit_code.txt

          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

      - name: Commit and push review fixes
        run: |
          BRANCH_NAME="${{ steps.setup_branch.outputs.BRANCH_NAME }}"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "fix: review updates for ${{ steps.plan_context.outputs.JIRA_KEY }}"
            git push origin "$BRANCH_NAME"
          else
            echo "No review changes to commit."
          fi

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-review
          path: review-artifact/
          retention-days: 7

      - name: Display review output
        if: always()
        run: |
          if [ -f review-artifact/output.txt ]; then
            echo "## Review Output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat review-artifact/output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -s review-artifact/error.txt ]; then
            echo "## Review Errors" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat review-artifact/error.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post review summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## AI Agent Review Complete

            The review phase finished for \`${{ steps.plan_context.outputs.JIRA_KEY }}\`.

            Next:
            - Comment \`/qa\` to run the QA phase

            <!-- Agent Review Run ID: ${process.env.GITHUB_RUN_ID} -->`;

            await github.rest.issues.createComment({
              issue_number: context.payload.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
