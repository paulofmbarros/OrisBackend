name: AI Agent - Proceed with Implementation

on:
  issue_comment:
    types: [created]

jobs:
  proceed:
    if: startsWith(github.event.comment.body, '/proceed')
    runs-on: ubuntu-latest
    environment:
      name: agent-implementation
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Find latest plan run
        id: find_plan
        uses: actions/github-script@v8
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });

            let planRunId = null;
            for (const comment of comments.data.slice().reverse()) {
              const match =
                comment.body.match(/Agent Plan Run ID:\s*(\d+)/) ||
                comment.body.match(/\*\*Run ID:\*\*\s*(\d+)/) ||
                comment.body.match(/Run ID:\s*(\d+)/);

              if (match && /AI Agent Plan/.test(comment.body)) {
                planRunId = match[1];
                break;
              }
            }

            if (!planRunId) {
              core.setFailed('Could not find the latest plan run. Generate or revise a plan before proceeding.');
              return;
            }

            core.setOutput('run_id', planRunId);

      - name: Download plan context
        uses: dawidd6/action-download-artifact@v18
        with:
          name: agent-context
          path: plan-context/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.find_plan.outputs.run_id }}
          if_no_artifact_found: fail

      - name: Download plan state
        uses: dawidd6/action-download-artifact@v18
        with:
          name: agent-state
          path: plan-state/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.find_plan.outputs.run_id }}
          if_no_artifact_found: fail

      - name: Read plan context
        id: plan_context
        run: |
          if [ ! -f plan-context/prompt.txt ]; then
            echo "Missing plan prompt artifact." >&2
            exit 1
          fi

          {
            echo "PROMPT<<EOF"
            cat plan-context/prompt.txt
            echo "EOF"
            echo "ROLE=$(cat plan-context/role.txt)"
            echo "RUNTIME=$(cat plan-context/runtime.txt)"
            echo "JIRA_KEY=$(cat plan-context/jira_ticket.txt)"
          } >> "$GITHUB_OUTPUT"

      - name: Restore plan state
        run: |
          mkdir -p tmp/state

          if [ -f plan-state/active_plan.md ]; then
            cp plan-state/active_plan.md tmp/state/active_plan.md
          fi

          if [ -f plan-state/active_ticket.txt ]; then
            cp plan-state/active_ticket.txt tmp/state/active_ticket.txt
          fi

      - name: Setup branch
        id: setup_branch
        run: |
          JIRA_KEY="${{ steps.plan_context.outputs.JIRA_KEY }}"
          if [ -z "$JIRA_KEY" ]; then
            echo "No Jira ticket found in plan context." >&2
            exit 1
          fi

          KEY_LOWER="$(printf '%s\n' "$JIRA_KEY" | tr '[:upper:]' '[:lower:]')"
          BRANCH_NAME="feature/$KEY_LOWER"

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin
          if git rev-parse --verify "origin/$BRANCH_NAME" >/dev/null 2>&1; then
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -B "$BRANCH_NAME"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Gemini CLI
        run: npm install -g --ignore-scripts @google/gemini-cli

      - name: Configure MCP servers
        run: |
          mkdir -p ~/.gemini

          node <<'EOF'
          const fs = require('fs');
          const mcpServers = {};

          if (process.env.NOTION_API_KEY) {
            mcpServers.notion = {
              command: 'npx',
              args: ['-y', '@modelcontextprotocol/server-notion'],
              env: {
                NOTION_API_KEY: process.env.NOTION_API_KEY,
              },
            };
          }

          fs.writeFileSync(
            process.env.HOME + '/.gemini/settings.json',
            JSON.stringify({ mcpServers }, null, 2)
          );
          EOF
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}

      - name: Configure phase MCP allowlist
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          servers=""

          if [ -n "$NOTION_API_KEY" ]; then
            servers="notion"
          fi

          echo "AGENT_MCP_SERVERS_OVERRIDE=$servers" >> "$GITHUB_ENV"

      - name: Setup environment
        run: |
          chmod +x scripts/agent.sh
          chmod +x scripts/run-phase.sh
          chmod +x scripts/runtimes/*.sh
          chmod +x scripts/lib/*.sh

      - name: Run implementation phase
        id: agent_implement
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT: ${{ steps.plan_context.outputs.PROMPT }}
          ROLE: ${{ steps.plan_context.outputs.ROLE }}
          RUNTIME: ${{ steps.plan_context.outputs.RUNTIME }}
          JIRA_KEY: ${{ steps.plan_context.outputs.JIRA_KEY }}
        run: |
          set +e
          OUTPUT_FILE="$(mktemp)"
          ERROR_FILE="$(mktemp)"

          IMPLEMENT_PROMPT="${PROMPT}"$'\n\n'"Approved plan. Proceed with implementation for ${JIRA_KEY}."

          HEADLESS=true ./scripts/run-phase.sh \
            --runtime "$RUNTIME" \
            --role "$ROLE" \
            --phase implement \
            "$IMPLEMENT_PROMPT" \
            > "$OUTPUT_FILE" 2> "$ERROR_FILE"

          EXIT_CODE=$?

          {
            echo "IMPLEMENTATION_OUTPUT<<EOF"
            cat "$OUTPUT_FILE"
            echo "EOF"
            echo "IMPLEMENTATION_ERROR<<EOF"
            cat "$ERROR_FILE"
            echo "EOF"
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

          mkdir -p implementation-artifact
          cp "$OUTPUT_FILE" implementation-artifact/output.txt
          cp "$ERROR_FILE" implementation-artifact/error.txt
          echo "$EXIT_CODE" > implementation-artifact/exit_code.txt

          if [ "$EXIT_CODE" -ne 0 ]; then
            if [ -s "$ERROR_FILE" ]; then
              echo "Implementation phase stderr:" >&2
              cat "$ERROR_FILE" >&2
            fi
            exit "$EXIT_CODE"
          fi

      - name: Commit and push changes
        run: |
          BRANCH_NAME="${{ steps.setup_branch.outputs.BRANCH_NAME }}"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "feat: implementation for ${{ steps.plan_context.outputs.JIRA_KEY }}"
            git push origin "$BRANCH_NAME"
          else
            echo "No changes to commit."
          fi

      - name: Upload implementation artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-implementation
          path: implementation-artifact/
          retention-days: 7

      - name: Display implementation output
        if: always()
        run: |
          if [ -f implementation-artifact/output.txt ]; then
            echo "## Implementation Output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat implementation-artifact/output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -s implementation-artifact/error.txt ]; then
            echo "## Implementation Errors" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat implementation-artifact/error.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post implementation summary
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const body = `## AI Agent Implementation Complete

            The implementation phase finished for \`${{ steps.plan_context.outputs.JIRA_KEY }}\`.

            Next:
            - Comment \`/review\` to run the automated review phase
            - Comment \`/qa\` to run the QA phase when the branch is ready

            <!-- Agent Implement Run ID: ${process.env.GITHUB_RUN_ID} -->`;

            await github.rest.issues.createComment({
              issue_number: context.payload.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
