name: AI Agent - QA Phase

on:
  issue_comment:
    types: [created]

jobs:
  qa:
    if: startsWith(github.event.comment.body, '/qa')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find latest plan run
        id: find_plan
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });

            let planRunId = null;
            for (const comment of comments.data.slice().reverse()) {
              const match =
                comment.body.match(/Agent Plan Run ID:\s*(\d+)/) ||
                comment.body.match(/\*\*Run ID:\*\*\s*(\d+)/) ||
                comment.body.match(/Run ID:\s*(\d+)/);

              if (match && /AI Agent Plan/.test(comment.body)) {
                planRunId = match[1];
                break;
              }
            }

            if (!planRunId) {
              core.setFailed('Could not find the latest plan run. Generate or revise a plan before QA.');
              return;
            }

            core.setOutput('run_id', planRunId);

      - name: Download plan context
        uses: dawidd6/action-download-artifact@v18
        with:
          name: agent-context
          path: plan-context/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.find_plan.outputs.run_id }}
          if_no_artifact_found: fail

      - name: Download plan state
        uses: dawidd6/action-download-artifact@v18
        with:
          name: agent-state
          path: plan-state/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.find_plan.outputs.run_id }}
          if_no_artifact_found: fail

      - name: Read plan context
        id: plan_context
        run: |
          if [ ! -f plan-context/prompt.txt ]; then
            echo "Missing plan prompt artifact." >&2
            exit 1
          fi

          {
            echo "PROMPT<<EOF"
            cat plan-context/prompt.txt
            echo "EOF"
            echo "ROLE=$(cat plan-context/role.txt)"
            echo "RUNTIME=$(cat plan-context/runtime.txt)"
            echo "JIRA_KEY=$(cat plan-context/jira_ticket.txt)"
          } >> "$GITHUB_OUTPUT"

      - name: Restore plan state
        run: |
          mkdir -p tmp/state

          if [ -f plan-state/active_plan.md ]; then
            cp plan-state/active_plan.md tmp/state/active_plan.md
          fi

          if [ -f plan-state/active_ticket.txt ]; then
            cp plan-state/active_ticket.txt tmp/state/active_ticket.txt
          fi

      - name: Setup branch
        id: setup_branch
        run: |
          JIRA_KEY="${{ steps.plan_context.outputs.JIRA_KEY }}"
          if [ -z "$JIRA_KEY" ]; then
            echo "No Jira ticket found in plan context." >&2
            exit 1
          fi

          KEY_LOWER="$(printf '%s\n' "$JIRA_KEY" | tr '[:upper:]' '[:lower:]')"
          BRANCH_NAME="feature/$KEY_LOWER"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          git fetch origin
          if git rev-parse --verify "origin/$BRANCH_NAME" >/dev/null 2>&1; then
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            echo "Remote branch origin/$BRANCH_NAME was not found." >&2
            exit 1
          fi

      - name: Verify Postman secret
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          if [ -z "$POSTMAN_API_KEY" ]; then
            echo "POSTMAN_API_KEY secret is required for QA runs." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Gemini CLI
        run: npm install -g --ignore-scripts @google/gemini-cli

      - name: Configure MCP servers
        run: |
          mkdir -p ~/.gemini

          node <<'EOF'
          const fs = require('fs');
          const mcpServers = {
            postman: {
              command: 'npx',
              args: ['-y', '@postman/postman-mcp-server'],
              env: {
                POSTMAN_API_KEY: process.env.POSTMAN_API_KEY,
              },
            },
          };

          if (
            process.env.ATLASSIAN_MCP_URL &&
            process.env.ATLASSIAN_MCP_CLIENT_ID &&
            process.env.ATLASSIAN_MCP_CLIENT_SECRET
          ) {
            mcpServers['atlassian-rovo-mcp-server'] = {
              url: process.env.ATLASSIAN_MCP_URL,
              auth: {
                type: 'oauth2',
                clientId: process.env.ATLASSIAN_MCP_CLIENT_ID,
                clientSecret: process.env.ATLASSIAN_MCP_CLIENT_SECRET,
              },
            };
          }

          fs.writeFileSync(
            process.env.HOME + '/.gemini/settings.json',
            JSON.stringify({ mcpServers }, null, 2)
          );
          EOF
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          ATLASSIAN_MCP_URL: ${{ secrets.ATLASSIAN_MCP_URL }}
          ATLASSIAN_MCP_CLIENT_ID: ${{ secrets.ATLASSIAN_MCP_CLIENT_ID }}
          ATLASSIAN_MCP_CLIENT_SECRET: ${{ secrets.ATLASSIAN_MCP_CLIENT_SECRET }}

      - name: Configure QA environment
        env:
          ATLASSIAN_MCP_URL: ${{ secrets.ATLASSIAN_MCP_URL }}
          ATLASSIAN_MCP_CLIENT_ID: ${{ secrets.ATLASSIAN_MCP_CLIENT_ID }}
          ATLASSIAN_MCP_CLIENT_SECRET: ${{ secrets.ATLASSIAN_MCP_CLIENT_SECRET }}
        run: |
          servers="postman"

          if [ -n "$ATLASSIAN_MCP_URL" ] && [ -n "$ATLASSIAN_MCP_CLIENT_ID" ] && [ -n "$ATLASSIAN_MCP_CLIENT_SECRET" ]; then
            echo "AGENT_GEMINI_POST_QA_JIRA_COMMENT=true" >> "$GITHUB_ENV"
            servers="${servers:+$servers,}atlassian-rovo-mcp-server"
          else
            echo "AGENT_GEMINI_POST_QA_JIRA_COMMENT=false" >> "$GITHUB_ENV"
          fi

          echo "AGENT_GEMINI_REQUIRE_QA_JIRA_COMMENT=false" >> "$GITHUB_ENV"
          echo "AGENT_MCP_SERVERS_OVERRIDE=$servers" >> "$GITHUB_ENV"

      - name: Setup environment
        run: |
          chmod +x scripts/agent.sh
          chmod +x scripts/run-phase.sh
          chmod +x scripts/runtimes/*.sh
          chmod +x scripts/lib/*.sh
          chmod +x scripts/start_backend_for_qa.sh

      - name: Run QA phase
        id: agent_qa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT: ${{ steps.plan_context.outputs.PROMPT }}
          ROLE: ${{ steps.plan_context.outputs.ROLE }}
          RUNTIME: ${{ steps.plan_context.outputs.RUNTIME }}
          JIRA_KEY: ${{ steps.plan_context.outputs.JIRA_KEY }}
        run: |
          set +e
          OUTPUT_FILE="$(mktemp)"
          ERROR_FILE="$(mktemp)"

          QA_PROMPT="${PROMPT}"$'\n\n'"Run QA for ${JIRA_KEY} using the approved plan."

          HEADLESS=true ./scripts/run-phase.sh \
            --runtime "$RUNTIME" \
            --role "$ROLE" \
            --phase qa \
            "$QA_PROMPT" \
            > "$OUTPUT_FILE" 2> "$ERROR_FILE"

          EXIT_CODE=$?

          {
            echo "QA_OUTPUT<<EOF"
            cat "$OUTPUT_FILE"
            echo "EOF"
            echo "QA_ERROR<<EOF"
            cat "$ERROR_FILE"
            echo "EOF"
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

          mkdir -p qa-artifact
          cp "$OUTPUT_FILE" qa-artifact/output.txt
          cp "$ERROR_FILE" qa-artifact/error.txt
          echo "$EXIT_CODE" > qa-artifact/exit_code.txt

          if [ "$EXIT_CODE" -ne 0 ]; then
            if [ -s "$ERROR_FILE" ]; then
              echo "QA phase stderr:" >&2
              cat "$ERROR_FILE" >&2
            fi
            exit "$EXIT_CODE"
          fi

      - name: Upload QA artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-qa
          path: qa-artifact/
          retention-days: 7

      - name: Display QA output
        if: always()
        run: |
          if [ -f qa-artifact/output.txt ]; then
            echo "## QA Output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat qa-artifact/output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -s qa-artifact/error.txt ]; then
            echo "## QA Errors" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat qa-artifact/error.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post QA summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## AI Agent QA Complete

            The QA phase finished for \`${{ steps.plan_context.outputs.JIRA_KEY }}\`.

            <!-- Agent QA Run ID: ${process.env.GITHUB_RUN_ID} -->`;

            await github.rest.issues.createComment({
              issue_number: context.payload.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
