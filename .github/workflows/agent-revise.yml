name: AI Agent - Revise Plan

on:
  issue_comment:
    types: [created]

jobs:
  revise:
    if: startsWith(github.event.comment.body, '/revise ')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract revision feedback
        id: extract_revision
        env:
          COMMENT_BODY_VAL: ${{ github.event.comment.body }}
          ISSUE_NUMBER_VAL: ${{ github.event.issue.number }}
        run: |
          REVISION_FEEDBACK="$(printf '%s\n' "$COMMENT_BODY_VAL" | sed -E 's|^\s*/revise\s+||')"

          if [ -z "$REVISION_FEEDBACK" ]; then
            echo "Revision feedback cannot be empty." >&2
            exit 1
          fi

          {
            echo "REVISION_FEEDBACK<<EOF"
            echo "$REVISION_FEEDBACK"
            echo "EOF"
            echo "ISSUE_NUMBER=$ISSUE_NUMBER_VAL"
          } >> "$GITHUB_OUTPUT"

      - name: Find latest plan run
        id: find_plan
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });

            let planRunId = null;
            for (const comment of comments.data.slice().reverse()) {
              const match =
                comment.body.match(/Agent Plan Run ID:\s*(\d+)/) ||
                comment.body.match(/\*\*Run ID:\*\*\s*(\d+)/) ||
                comment.body.match(/Run ID:\s*(\d+)/);

              if (match && /AI Agent Plan/.test(comment.body)) {
                planRunId = match[1];
                break;
              }
            }

            if (!planRunId) {
              core.setFailed('Could not find the latest plan run to revise.');
              return;
            }

            core.setOutput('run_id', planRunId);

      - name: Download plan context
        uses: dawidd6/action-download-artifact@v3
        with:
          name: agent-context
          path: plan-context/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.find_plan.outputs.run_id }}
          if_no_artifact_found: fail

      - name: Download plan state
        uses: dawidd6/action-download-artifact@v3
        with:
          name: agent-state
          path: plan-state/
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.find_plan.outputs.run_id }}
          if_no_artifact_found: fail

      - name: Read plan context
        id: plan_context
        run: |
          if [ ! -f plan-context/prompt.txt ]; then
            echo "Missing plan prompt artifact." >&2
            exit 1
          fi

          {
            echo "PROMPT<<EOF"
            cat plan-context/prompt.txt
            echo "EOF"
            echo "ROLE=$(cat plan-context/role.txt)"
            echo "RUNTIME=$(cat plan-context/runtime.txt)"
            echo "JIRA_KEY=$(cat plan-context/jira_ticket.txt)"
          } >> "$GITHUB_OUTPUT"

      - name: Restore plan state
        run: |
          mkdir -p tmp/state

          if [ -f plan-state/active_plan.md ]; then
            cp plan-state/active_plan.md tmp/state/active_plan.md
          fi

          if [ -f plan-state/active_ticket.txt ]; then
            cp plan-state/active_ticket.txt tmp/state/active_ticket.txt
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g --ignore-scripts @google/gemini-cli

      - name: Configure MCP servers
        run: |
          mkdir -p ~/.gemini

          node <<'EOF'
          const fs = require('fs');
          const mcpServers = {};

          if (process.env.NOTION_API_KEY) {
            mcpServers.notion = {
              command: 'npx',
              args: ['-y', '@modelcontextprotocol/server-notion'],
              env: {
                NOTION_API_KEY: process.env.NOTION_API_KEY,
              },
            };
          }

          if (
            process.env.ATLASSIAN_MCP_URL &&
            process.env.ATLASSIAN_MCP_CLIENT_ID &&
            process.env.ATLASSIAN_MCP_CLIENT_SECRET
          ) {
            mcpServers['atlassian-rovo-mcp-server'] = {
              url: process.env.ATLASSIAN_MCP_URL,
              auth: {
                type: 'oauth2',
                clientId: process.env.ATLASSIAN_MCP_CLIENT_ID,
                clientSecret: process.env.ATLASSIAN_MCP_CLIENT_SECRET,
              },
            };
          }

          fs.writeFileSync(
            process.env.HOME + '/.gemini/settings.json',
            JSON.stringify({ mcpServers }, null, 2)
          );
          EOF
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ATLASSIAN_MCP_URL: ${{ secrets.ATLASSIAN_MCP_URL }}
          ATLASSIAN_MCP_CLIENT_ID: ${{ secrets.ATLASSIAN_MCP_CLIENT_ID }}
          ATLASSIAN_MCP_CLIENT_SECRET: ${{ secrets.ATLASSIAN_MCP_CLIENT_SECRET }}

      - name: Setup environment
        run: |
          chmod +x scripts/agent.sh
          chmod +x scripts/run-phase.sh
          chmod +x scripts/runtimes/*.sh
          chmod +x scripts/lib/*.sh

      - name: Prepare revised prompt
        id: prep_agent
        env:
          PROMPT: ${{ steps.plan_context.outputs.PROMPT }}
          REVISION_FEEDBACK: ${{ steps.extract_revision.outputs.REVISION_FEEDBACK }}
          ROLE: ${{ steps.plan_context.outputs.ROLE }}
        run: |
          CONTRACT_FILE="agent-contracts/${ROLE}.md"

          FULL_PROMPT="You are the Oris Backend Engineer AI.

          ### CRITICAL RESOURCES:
          Your mandatory behavior contract and architecture rules are located in: '${CONTRACT_FILE}'.

          ### RULES:
          1. **READ THE CONTRACT**: Use your file system tools to read '${CONTRACT_FILE}' immediately.
          2. **MCP TOOLS**:
             - Use Notion MCP to search for 'Domain Definition' and the Jira ticket key.
             - Summarize findings in 'Notion References'.

          ### TASK:
          ${PROMPT}

          ### REVISION REQUEST:
          ${REVISION_FEEDBACK}

          IMPORTANT: Stop after 'Proposed Plan'. Do not implement yet."

          {
            echo "ENHANCED_PROMPT<<EOF"
            echo "$FULL_PROMPT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run revised plan phase
        id: agent_revision
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ROLE: ${{ steps.plan_context.outputs.ROLE }}
          RUNTIME: ${{ steps.plan_context.outputs.RUNTIME }}
          ENHANCED_PROMPT: ${{ steps.prep_agent.outputs.ENHANCED_PROMPT }}
        run: |
          set +e
          OUTPUT_FILE="$(mktemp)"
          ERROR_FILE="$(mktemp)"

          HEADLESS=true ./scripts/run-phase.sh \
            --runtime "$RUNTIME" \
            --role "$ROLE" \
            --phase plan \
            "$ENHANCED_PROMPT" \
            > "$OUTPUT_FILE" 2> "$ERROR_FILE"

          EXIT_CODE=$?

          {
            echo "PLAN_OUTPUT<<EOF"
            cat "$OUTPUT_FILE"
            echo "EOF"
            echo "PLAN_ERROR<<EOF"
            cat "$ERROR_FILE"
            echo "EOF"
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

          mkdir -p plan-output-temp
          cp "$OUTPUT_FILE" plan-output-temp/output.txt
          cp "$ERROR_FILE" plan-output-temp/error.txt
          echo "$EXIT_CODE" > plan-output-temp/exit_code.txt

          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

      - name: Save revised context
        env:
          PROMPT: ${{ steps.plan_context.outputs.PROMPT }}
          ROLE: ${{ steps.plan_context.outputs.ROLE }}
          RUNTIME: ${{ steps.plan_context.outputs.RUNTIME }}
          JIRA_KEY: ${{ steps.plan_context.outputs.JIRA_KEY }}
        run: |
          mkdir -p plan-context-out
          printf '%s\n' "$PROMPT" > plan-context-out/prompt.txt
          printf '%s\n' "$ROLE" > plan-context-out/role.txt
          printf '%s\n' "$RUNTIME" > plan-context-out/runtime.txt
          printf '%s\n' "$JIRA_KEY" > plan-context-out/jira_ticket.txt

      - name: Save revised plan state
        run: |
          mkdir -p plan-state-out

          if [ -f tmp/state/active_plan.md ]; then
            cp tmp/state/active_plan.md plan-state-out/active_plan.md
          fi

          if [ -f tmp/state/active_ticket.txt ]; then
            cp tmp/state/active_ticket.txt plan-state-out/active_ticket.txt
          fi

          if [ ! -f plan-state-out/active_plan.md ]; then
            echo "Missing tmp/state/active_plan.md after revised planning run." >&2
            exit 1
          fi

      - name: Display revised plan output
        if: steps.agent_revision.outputs.PLAN_OUTPUT != ''
        run: |
          echo "## Revised Plan Output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat plan-output-temp/output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload revised plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-plan
          path: plan-output-temp/
          retention-days: 7

      - name: Upload revised context artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-context
          path: plan-context-out/
          retention-days: 7

      - name: Upload revised state artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-state
          path: plan-state-out/
          retention-days: 7

      - name: Post revised plan comment
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.extract_revision.outputs.ISSUE_NUMBER }}
          PLAN_OUTPUT: ${{ steps.agent_revision.outputs.PLAN_OUTPUT }}
          REVISION_FEEDBACK: ${{ steps.extract_revision.outputs.REVISION_FEEDBACK }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const planOutput = process.env.PLAN_OUTPUT || '';
            const revisionFeedback = process.env.REVISION_FEEDBACK || '';

            const body = `## AI Agent Plan (Revised)

            > Revision feedback: ${revisionFeedback}

            ${planOutput}

            ---
            **Run ID:** ${process.env.GITHUB_RUN_ID}

            Next:
            - Comment \`/proceed\` to implement the revised plan
            - Comment \`/revise <feedback>\` to request another revision

            <!-- Agent Plan Run ID: ${process.env.GITHUB_RUN_ID} -->`;

            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
